# variables.yaml
# Constants used across the ble_audio.robot test suite.
# Each variable is documented: name (type) - meaning.

# DEVICE_NAME (str) - name of the mocked BLE Audio device used in pairing tests
DEVICE_NAME: "Limes Inferior"

# SECONDARY_DEVICE_NAME (str) - name of the second device used in the multi-device switching scenario
SECONDARY_DEVICE_NAME: "TV Streamer Sim"

# INVALID_DEVICE_NAME (str) - name of an incompatible device used in the negative pairing scenario
INVALID_DEVICE_NAME: "Unknown BLE Device"

# RECONNECT_TIMEOUT_SEC (int) - maximum time in seconds the device should attempt to reconnect after signal loss
RECONNECT_TIMEOUT_SEC: 5

# RECONNECT_TIMEOUT_EXCEEDED_SEC (int) - simulated signal-loss duration, deliberately longer than RECONNECT_TIMEOUT_SEC, used in the negative timeout scenario
RECONNECT_TIMEOUT_EXCEEDED_SEC: 8

# LOW_BATTERY_THRESHOLD_PERCENT (int) - battery percentage threshold below which the device enters power-save mode
LOW_BATTERY_THRESHOLD_PERCENT: 10

# LOW_BATTERY_LEVEL_PERCENT (int) - simulated battery level used in the low-battery fallback test, below LOW_BATTERY_THRESHOLD_PERCENT
LOW_BATTERY_LEVEL_PERCENT: 7

# FULL_BATTERY_LEVEL_PERCENT (int) - simulated battery level used as the starting point in most tests
FULL_BATTERY_LEVEL_PERCENT: 85

# CRITICAL_BATTERY_LEVEL_PERCENT (int) - simulated battery level too low to safely start a new pairing session
CRITICAL_BATTERY_LEVEL_PERCENT: 3

# MINIMUM_BATTERY_FOR_PAIRING_PERCENT (int) - minimum battery percent required before pairing is allowed
MINIMUM_BATTERY_FOR_PAIRING_PERCENT: 15

# SIGNAL_DROP_CYCLES (int) - number of consecutive signal-loss-and-reconnect cycles simulated in the repeated-drop scenario
SIGNAL_DROP_CYCLES: 3

# STREAM_STABILITY_SAMPLE_COUNT (int) - number of samples taken when checking audio stream stability
STREAM_STABILITY_SAMPLE_COUNT: 5

# FLAKY_FAIL_CHANCE_PERCENT (int) - probability (0-100) that a test tagged as flaky-eligible randomly fails, to simulate real-world CI flakiness
FLAKY_FAIL_CHANCE_PERCENT: 20

# MAX_LATENCY_BUDGET_MS (int) - maximum acceptable round-trip audio latency, in milliseconds, before comb filtering becomes audible against live sound
MAX_LATENCY_BUDGET_MS: 20

# DEGRADED_CODEC_QUALITY (str) - simulated codec/link quality label representing a higher-latency fallback (e.g. weak radio link or fallback codec)
DEGRADED_CODEC_QUALITY: "degraded"

# OPTIMAL_CODEC_QUALITY (str) - simulated codec/link quality label representing the best-case, lowest-latency codec/link
OPTIMAL_CODEC_QUALITY: "optimal"

# BROADCAST_NAME (str) - name of the simulated public Auracast broadcast stream used in broadcast tests
BROADCAST_NAME: "Gate 14 Announcements"

# CLINICIAN_TOOL_IDENTITY (str) - identity string representing the privileged clinical fitting software
CLINICIAN_TOOL_IDENTITY: "clinician_tool"

# CONSUMER_APP_IDENTITY (str) - identity string representing the regular consumer companion app
CONSUMER_APP_IDENTITY: "consumer_app"
